<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Young Talentos</title>
    <script>
      // SPA redirect: converte o path em query string para o index.html redirecionar
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + l.pathname.split('/').slice(0, 1).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1) + (l.search ? '&' + l.search.slice(1) : '')) +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
