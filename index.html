<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- SPA redirect: reconstrói a URL a partir do ?p= gerado pelo 404.html (GitHub Pages) -->
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        } else {
          var p = new URLSearchParams(location.search).get('p');
          if (p) {
            history.replaceState(null, null, '/' + decodeURIComponent(p));
          }
        }
      })();
    </script>
